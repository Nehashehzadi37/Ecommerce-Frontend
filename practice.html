<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice HTML</title>
</head>
<body>
    <div onmouseover="this.style.backgroundColor='lightblue'; this.innerText='Neha';" 
    onmouseout="this.style.backgroundColor='white'; this.innerHTML='Hover on me'" style="width: 200px; height: 200px; background-color: white; border: 1px solid #ccc;">
    Hover on me
</div>
</body>
</html>
